# LEFT JOIN — all customers, even without orders
left = pd.merge(customers, orders, on='customer_id', how='left')

# OUTER JOIN — everything (nulls where no match)
outer = pd.merge(customers, orders, on='customer_id', how='outer')

            theory: "Rolling windows compute metrics over a sliding time window — the technical foundation of moving averages, volatility bands, and exponential smoothing. Lag features (shift) are critical for ML forecasting — you cannot use future data to predict the present. These are the two most common time-series feature engineering patterns.",
            code: `import pandas as pd, numpy as np

np.random.seed(42)
idx = pd.date_range('2024-01-01', periods=100, freq='D')
prices = pd.Series(
    100 + np.cumsum(np.random.randn(100)),
    index=idx, name='price'
)
df = prices.to_frame()

# --- Rolling aggregations ---
df['MA7']   = prices.rolling(window=7).mean()    # 7-day moving average
df['MA30']  = prices.rolling(window=30).mean()   # 30-day moving average
df['std7']  = prices.rolling(window=7).std()     # 7-day volatility
df['max7']  = prices.rolling(window=7).max()     # 7-day high

# min_periods: don't require full window to start
df['MA7_nw'] = prices.rolling(7, min_periods=1).mean()

# --- Exponential weighted moving average (reacts faster to recent data) ---
df['EMA12'] = prices.ewm(span=12).mean()

# --- Lag features (for ML time series) ---
df['lag_1']  = prices.shift(1)    # yesterday's price
df['lag_7']  = prices.shift(7)    # same day last week
df['lag_30'] = prices.shift(30)   # same day last month

df['weekly_return'] = prices.pct_change(7)        # % change vs 7 days ago

            code: `import pandas as pd, numpy as np, time

np.random.seed(42)
n = 1_000_000
df = pd.DataFrame({
    'salary':  np.random.randint(30000, 200000, n).astype(float),
    'age':     np.random.randint(22, 65, n),
    'dept':    np.random.choice(['Eng','Sales','HR','Marketing'], n),
    'rating':  np.random.randint(1, 6, n)
})

# ---- CASE 1: Binary condition ----
# SLOW (apply)
t = time.time()
df['band_slow'] = df['salary'].apply(lambda x: 'Senior' if x > 100000 else 'Junior')
print(f"apply:    {time.time()-t:.3f}s")

# FAST (np.where)
t = time.time()
df['band_fast'] = np.where(df['salary'] > 100000, 'Senior', 'Junior')
print(f"np.where: {time.time()-t:.3f}s")

# ---- CASE 2: Multiple conditions ----
# SLOW
t = time.time()
def classify(row):
    if row['salary'] > 150000: return 'L5'
    elif row['salary'] > 100000: return 'L4'
    elif row['salary'] > 70000:  return 'L3'
    else:                        return 'L2'
df['level_slow'] = df.apply(classify, axis=1)
print(f"apply row: {time.time()-t:.3f}s")

# FAST (np.select — multiple conditions, vectorized)
t = time.time()
conditions = [
    df['salary'] > 150000,
    df['salary'] > 100000,
    df['salary'] > 70000,
]
choices = ['L5', 'L4', 'L3']

def validate_employee_df(df: pd.DataFrame) -> None:

    issues = {'missing_cols':[], 'type_errors':{},
              'null_counts':{}, 'range_errors':{}}
    required = ['order_id','customer_id','amount','quantity','status']
    valid_s  = {'pending','shipped','delivered','cancelled'}

    # a
    issues['missing_cols'] = [c for c in required if c not in df.columns]

    # b
    try:
        pd.to_numeric(df['amount'], errors='raise')
    except Exception:
        issues['type_errors']['amount'] = 'non-numeric values present'

    # c
    issues['null_counts'] = {c: int(df[c].isnull().sum())
                              for c in required if c in df.columns
                              and df[c].isnull().sum() > 0}
    # d
    num_amount = pd.to_numeric(df['amount'], errors='coerce')
    if (num_amount <= 0).any():
        issues['range_errors']['amount'] = 'values <= 0 found'
    if (df['quantity'] <= 0).any():
        issues['range_errors']['quantity'] = 'values <= 0 found'

    bad_status = set(df['status'].unique()) - valid_s
    if bad_status:
        issues['range_errors']['status'] = f'invalid values: {bad_status}'

# --- The transformation function we want to test ---
def compute_salary_band(df: pd.DataFrame) -> pd.DataFrame:
    """Add salary_band column: Senior/Mid/Junior based on salary."""
    df = df.copy()
    conditions = [df['salary'] > 120000, df['salary'] > 80000]
    choices    = ['Senior', 'Mid']
    df['salary_band'] = np.select(conditions, choices, default='Junior')
    return df

def normalize_column(series: pd.Series) -> pd.Series:
    """Min-max normalize a series to [0, 1]."""
    mn, mx = series.min(), series.max()
    if mn == mx:
        return pd.Series(np.zeros(len(series)), index=series.index)
    return (series - mn) / (mx - mn)

    const ChevronIcon = ({ open }) => (

    function CodeBlock({ code, label = "CODE" }) {
      const [copied, setCopied] = useState(false);
      const copy = () => {
        navigator.clipboard.writeText(code);
        setCopied(true);
        setTimeout(() => setCopied(false), 1500);
      };
      return (
        <div style={{ borderRadius: 10, overflow: "hidden", marginBottom: 14, border: "1px solid #1e293b" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center",
                        background: "#0f172a", padding: "7px 14px" }}>
            <span style={{ fontSize: 11, fontFamily: "monospace", color: "#64748b", letterSpacing: 1 }}>{label}</span>
            <button onClick={copy} style={{ background: "none", border: "none", color: copied ? "#4ade80" : "#64748b",
                                            cursor: "pointer", display: "flex", alignItems: "center", gap: 5,
                                            fontSize: 12, padding: "2px 6px" }}>
              <CopyIcon /> {copied ? "Copied!" : "Copy"}
            </button>
          </div>
          <pre style={{ margin: 0, padding: "16px 18px", background: "#020817",
                        color: "#e2e8f0", fontSize: 13, lineHeight: 1.7, overflowX: "auto",
                        fontFamily: "'Fira Code', 'JetBrains Mono', 'Courier New', monospace" }}>
            {code.trim()}
          </pre>
        </div>
      );
    }

          </div>
          <div style={{ padding: "18px 22px" }}>
            <div style={{ background: `${color}12`, border: `1px solid ${color}30`, borderRadius: 8,
